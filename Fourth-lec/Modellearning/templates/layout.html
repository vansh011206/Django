

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}My Django Website{% endblock %}</title> <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100 text-slate-800 min-h-screen"> <!-- Navbar -->
    <nav class="bg-white shadow-md">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between"> <a href="/"
                class="text-2xl font-bold text-indigo-600"> DjangoSite </a>
            <div class="space-x-6"> <a href="/" class="text-gray-700 hover:text-indigo-600 transition"> Home </a> <a
                    href="#" class="text-gray-700 hover:text-indigo-600 transition"> About </a> <a href="#"
                    class="text-gray-700 hover:text-indigo-600 transition"> Contact </a> </div>
        </div>
    </nav> <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-6 py-10">
        <div class="bg-white rounded-xl shadow-lg p-8"> {% block content %} <!-- Child template content goes here --> {% endblock %} </div>
    </main> <!-- Footer -->
    <footer class="mt-10 bg-slate-900 text-gray-300">
        <div class="max-w-7xl mx-auto px-6 py-6 text-center">
            <p>&copy; 2026 DjangoSite. All rights reserved.</p>
        </div>
    </footer>
</body>

</html>
